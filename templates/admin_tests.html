<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Tests</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">📝 Manage Tests</h2>

    <div class="card p-4 shadow mb-4">
        <form method="POST">
            <div class="row">
                <div class="col-md-3 mb-3">
                    <input type="text" name="test_name" class="form-control" placeholder="Test Name" required>
                </div>
                <div class="col-md-3 mb-3">
                    <input type="text" name="subject" class="form-control" placeholder="Subject" required>
                </div>
                <div class="col-md-3 mb-3">
                    <input type="text" name="class" class="form-control" placeholder="Class" required>
                </div>
                <div class="col-md-3 mb-3">
                    <input type="date" name="test_date" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Add Test</button>
            <a href="/" class="btn btn-secondary">Back</a>
        </form>
    </div>

    <div class="card p-4 shadow">
        <h4 class="mb-3">Test List</h4>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Test Name</th>
                    <th>Subject</th>
                    <th>Class</th>
                    <th>Test Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% if tests %}
                    {% for t in tests %}
                    <tr>
                        <td>{{ t[0] }}</td>
                        <td>{{ t[1] }}</td>
                        <td>{{ t[2] }}</td>
                        <td>{{ t[3] }}</td>
                        <td>{{ t[4] }}</td>
                        <td>
                            <a href="/delete_test/{{ t[0] }}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="6" class="text-center">No tests found</td>
                    </tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
