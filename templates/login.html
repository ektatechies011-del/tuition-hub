<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login | Tuition Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d6efd, #6610f2, #20c997);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before, body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            animation: float 6s infinite ease-in-out;
        }

        body::before {
            width: 200px;
            height: 200px;
            top: 50px;
            left: 50px;
        }

        body::after {
            width: 150px;
            height: 150px;
            bottom: 60px;
            right: 60px;
            animation-delay: 2s;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .login-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            animation: fadeInUp 1s ease;
        }

        .login-title {
            font-weight: 700;
            color: white;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus {
            border-color: #6610f2;
            box-shadow: none;
        }

        .btn-login {
            border-radius: 30px;
            padding: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: scale(1.05);
        }

        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .footer-text {
            font-size: 13px;
            color: #e0e0e0;
        }

        .toggle-password {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 38px;
            color: #555;
        }

        .input-box {
            position: relative;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width: 500px) {
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

<div class="login-card text-center">

    <div class="logo">🎓</div>
    <h3 class="login-title mb-2">Tuition Hub</h3>
    <p class="text-light mb-3">Login to continue</p>

    <!-- ✅ ERROR MESSAGE -->
    {% if error %}
    <div class="alert alert-danger text-center py-2">
        {{ error }}
    </div>
    {% endif %}

    <!-- FORM -->
    <form method="POST" action="/login">

        <div class="mb-3 text-start">
            <label class="text-light">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>

        <div class="mb-3 text-start input-box">
            <label class="text-light">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>

            <!-- 👁️ Toggle -->
            <span class="toggle-password" onclick="togglePassword()">👁️</span>
        </div>

        <button type="submit" class="btn btn-light w-100 btn-login">
            🔐 Login
        </button>

    </form>

    <p class="footer-text mt-3">
        Admin: admin / 1234
    </p>

</div>

<script>
function togglePassword() {
    var pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
