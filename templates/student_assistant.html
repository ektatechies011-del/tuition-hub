<!DOCTYPE html>
<html lang="en">
<head>
    <title>Study Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .top-box {
            background: linear-gradient(90deg, #198754, #0d6efd);
            color: white;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0px 6px 18px rgba(0,0,0,0.12);
        }

        .card-box {
            background: white;
            border-radius: 18px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.10);
            padding: 25px;
        }

        .answer-box {
            background: #f8f9fa;
            border-left: 5px solid #198754;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container py-4">

    <div class="top-box mb-4 text-center">
        <h2>🤖 Study Assistant</h2>
        <p class="mb-0">Ask any study-related question</p>
    </div>

    <div class="text-end mb-3">
        <a href="/" class="btn btn-secondary">Home</a>
        <a href="/student" class="btn btn-primary">Dashboard</a>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <div class="card-box">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Enter your question</label>
                <input type="text" name="question" class="form-control" placeholder="Example: What is photosynthesis?" required>
            </div>

            <button type="submit" class="btn btn-success">Ask Assistant</button>
        </form>

        {% if answer %}
        <div class="mt-4">
            <h5>Answer:</h5>
            <div class="answer-box">
                {{ answer }}
            </div>
        </div>
        {% endif %}
    </div>

</div>

</body>
</html>
