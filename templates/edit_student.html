<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .form-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">✏️ Edit Student</h2>

    <div class="form-box">

        <form method="POST">

            <!-- Name -->
            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" value="{{ student[1] }}" required>
            </div>

            <!-- Class -->
            <div class="mb-3">
                <label>Class</label>
                <input type="text" name="class" class="form-control" value="{{ student[2] }}" required>
            </div>

            <!-- School -->
            <div class="mb-3">
                <label>School Name</label>
                <input type="text" name="school" class="form-control" value="{{ student[3] }}" required>
            </div>

            <!-- Joining Date -->
            <div class="mb-3">
                <label>Joining Date</label>
                <input type="date" name="joining_date" class="form-control" value="{{ student[4] }}" required>
            </div>

            <!-- Fee -->
            <div class="mb-3">
                <label>Fee (₹)</label>
                <input type="number" name="fee" class="form-control" value="{{ student[5] }}" required>
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label>Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ student[6] }}" required>
            </div>

            <!-- Username -->
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" value="{{ student[7] }}" required>
            </div>

            <!-- Buttons -->
            <button type="submit" class="btn btn-success">
                Update
            </button>

            <a href="/admin" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

</body>
</html>
